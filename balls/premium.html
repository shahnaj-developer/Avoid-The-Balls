    function renderLevels() {
      levelList.innerHTML = "";
      premiumLevels.forEach(item => {
        const div = document.createElement("div");
        div.className = "level";
        div.innerHTML = `
          <strong>Level ${item.level}:</strong><br>
          ${item.question}<br>
          <button onclick="revealAnswer(${item.level})">Unlock (10 coins)</button>
          <div id="answer-${item.level}" style="margin-top:8px;"></div>
        `;
        levelList.appendChild(div);
      });
    }

    function revealAnswer(levelNum) {
      const levelData = premiumLevels.find(l => l.level === levelNum);
      if (premiumCoins < 10) {
        alert("Not enough premium coins.");
        return;
      }
      premiumCoins -= 10;
      localStorage.setItem("premiumCoins", premiumCoins);
      premiumCoinsDisplay.innerText = premiumCoins;

      const answerDiv = document.getElementById(`answer-${levelNum}`);
      answerDiv.innerHTML = `<strong>Answer:</strong> ${levelData.answer}<br><strong>Explanation:</strong> ${levelData.explanation}`;
    }

    watchAdsBtn.onclick = () => {
      watchAdsBtn.innerText = "⏳ Watching Ad...";
      watchAdsBtn.disabled = true;
      setTimeout(() => {
        premiumCoins += 10;
        localStorage.setItem("premiumCoins", premiumCoins);
        premiumCoinsDisplay.innerText = premiumCoins;
        watchAdsBtn.innerText = "📺 Watch Ads to Get More Coins";
        watchAdsBtn.disabled = false;
        alert("Thanks for watching! +10 coins");
      }, 3000);
    };

    renderLevels();
  </script>
