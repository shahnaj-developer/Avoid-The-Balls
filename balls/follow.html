<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact & Follow Us</title>
  <style>
    body {
      margin: 0;
      background: #0d0d0d;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .contact-container {
      background: rgba(0, 255, 255, 0.05);
      border: 2px solid #00ffff;
      border-radius: 20px;
      padding: 30px 20px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 0 20px #00ffff33;
      animation: fadeIn 1s ease-out;
      text-align: center;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .contact-container h2 {
      color: #00ffff;
      font-size: 28px;
      margin-bottom: 10px;
      text-shadow: 0 0 8px #00ffff;
    }

    .contact-container p {
      color: #ccc;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .email-link {
      display: inline-block;
      margin-bottom: 25px;
      color: #00ffff;
      font-weight: bold;
      text-decoration: none;
      font-size: 16px;
      word-wrap: break-word;
    }

    .email-link:hover {
      text-decoration: underline;
      color: #00faff;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .social-icons a img {
      width: 40px;
      height: 40px;
      transition: transform 0.3s ease, filter 0.3s ease;
      filter: drop-shadow(0 0 6px #00ffff);
    }

    .social-icons a img:hover {
      transform: scale(1.2);
      filter: drop-shadow(0 0 15px #00ffff);
    }

    /* Responsive tweaks */
    @media (max-width: 400px) {
      .contact-container h2 { font-size: 22px; }
      .email-link { font-size: 14px; }
    }
  </style>
</head>
<body>

  <div class="contact-container">
    <h2>Contact & Follow Us</h2>
    <p>Have feedback, ideas or just want to say hi? or there is problem in my game then just send a email</p>
    <a href="mailto:tahsin2.abc2009@gmail.com" class="email-link">tahsin2.abc2009@gmail.com</a>

    <div class="social-icons">
      <a href="https://www.facebook.com/tahsin.hossain.997975" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
      </a>
      <a href="https://twitter.com" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" alt="Twitter">
      </a>
      <a href="https://instagram.com" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
      </a>
      <a href="https://www.youtube.com/@tahsin-p1v4d" target="_blank">
        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube">
      </a>
    </div>
  </div>

</body>
</html>
