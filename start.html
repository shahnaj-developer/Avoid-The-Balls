<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Challenge Quiz Game</title>
<style>
  body, html {
    margin: 0; padding: 0;
    height: 100%;
    background: #0a0a12;
    color: #eee;
    font-family: 'Orbitron', monospace, sans-serif;
  }
  #app {
    max-width: 480px;
    margin: 0 auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #11111f, #05050a);
  }
  header, button, #levels-grid, #question, #hint, #feedback {
    user-select: none;
  }
  button {
    font-family: 'Orbitron', monospace, sans-serif;
    background: #0ff;
    border: none;
    padding: 1rem 1.5rem;
    margin: 1rem auto;
    border-radius: 12px;
    font-size: 1.25rem;
    font-weight: 700;
    color: #000;
    cursor: pointer;
  }
  button:active {
    background: #08c;
  }
  #home, #levels, #challenge {
    flex-grow: 1;
    display: none;
    padding: 1rem 1rem 2rem;
    overflow-y: auto;
  }
  #home.active, #levels.active, #challenge.active {
    display: flex;
    flex-direction: column;
  }
  .levels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(48px,1fr));
    gap: 10px;
  }
  .level-box {
    background: #222233;
    border-radius: 10px;
    color: #aaa;
    text-align: center;
    line-height: 48px;
    font-weight: 700;
    font-size: 1.15rem;
    cursor: pointer;
  }
  .level-box.locked {
    cursor: not-allowed;
    color: #444455;
    background: #11111a;
  }
  .level-box.completed {
    background: #0f4;
    color: #010;
  }
  .level-box.current {
    background: #08f;
    color: #cff;
  }
  #challenge header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    color: #0ff;
  }
  #challenge header button {
    background: transparent;
    color: #0ff;
    font-size: 1.1rem;
    padding: 0.3rem 0.6rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }
  #challenge header button:active {
    color: #08c;
  }
  #question {
    font-size: 1.4rem;
    margin-bottom: 0.4rem;
    min-height: 60px;
  }
  #hint {
    font-size: 1rem;
    color: #0fa;
    margin-bottom: 1rem;
    font-style: italic;
  }
  /* SIMPLE, PLAIN INPUT: NO FONT CHANGES, NO COLORS, NO SHADOWS */
  #answer-input {
    all: unset; /* resets all styles */
    display: block;
    width: 100%;
    max-width: 320px;
    margin: 0 auto 1rem;
    padding: 0.5rem 0.75rem;
    font-size: 1rem;
    font-family: inherit;
    color: black;
    background: white;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
  }
  #answer-input:focus {
    outline: 2px solid #0ff;
  }
  #submit-btn {
    background: #0ff;
    color: #000;
    font-weight: 700;
    width: 140px;
    margin: 0 auto;
    padding: 0.8rem;
    border-radius: 12px;
    cursor: pointer;
  }
  #submit-btn:active {
    background: #08c;
  }
  #feedback {
    margin-top: 0.8rem;
    text-align: center;
    font-size: 1rem;
    min-height: 24px;
  }
  #feedback.wrong {
    color: #f44;
  }
  #feedback.correct {
    color: #0f4;
  }

  #answer-container {
  margin: 20px auto;
  width: 90%;
  max-width: 400px;
  text-align: center;
}

</style>
</head>
<body>
<div id="app">

  <!-- HOME SCREEN -->
  <section id="home" class="active" aria-label="Home Screen">
    <h1 style="text-align:center; font-size:2rem; margin-top: 3rem; color:#0ff;">Challenge Quiz Game</h1>
    <button id="start-btn" aria-label="Start Solving Challenges">Start Solving Challenges</button>
  </section>

  <!-- LEVELS SCREEN -->
  <section id="levels" aria-label="Levels Screen" tabindex="0">
    <header>Levels</header>
    <div class="levels-grid" id="levels-grid" aria-live="polite" aria-relevant="additions"></div>
  </section>

  <!-- CHALLENGE SCREEN -->
  <section id="challenge" aria-label="Challenge Screen">
    <header>
      <button id="back-to-levels" aria-label="Back to Levels">← Back</button>
      <div id="level-indicator" aria-live="polite" aria-atomic="true">Level 1 / 250</div>
      <div style="width: 50px;"></div>
    </header>
    <main>
      <div id="question" role="heading" aria-level="2"></div>
      <div id="hint"></div>
      <input
        id="answer-input"
        type="text"
        inputmode="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="none"
        spellcheck="false"
        aria-label="Type your answer here"
      />
      <button id="submit-btn" aria-label="Submit Answer">Submit</button>
      <button id="answerBtn">Answer</button>
      <div id="feedback" role="alert" aria-live="assertive"></div>
      <div id="answer-container">
</div>
</div>
</div>
</div>

    </main>
  </section>

  const homeScreen = document.getElementById('home');
  const startBtn = document.getElementById('start-btn');
  const levelsScreen = document.getElementById('levels');
  const levelsGrid = document.getElementById('levels-grid');
  const challengeScreen = document.getElementById('challenge');
  const backToLevelsBtn = document.getElementById('back-to-levels');
  const levelIndicator = document.getElementById('level-indicator');
  const questionEl = document.getElementById('question');
  const hintEl = document.getElementById('hint');
  const answerInput = document.getElementById('answer-input');
  const submitBtn = document.getElementById('submit-btn');
  const feedbackEl = document.getElementById('feedback');

  const STORAGE_KEY = "challenge_quiz_progress";
  let highestCompletedLevel = 0;
  let currentLevel = 0;

  function loadProgress(){
    const data = localStorage.getItem(STORAGE_KEY);
    if(data){
      try {
        const obj = JSON.parse(data);
        if(typeof obj.highestCompletedLevel === "number"){
          highestCompletedLevel = obj.highestCompletedLevel;
        }
      } catch(e){}
    }
  }
  function saveProgress(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify({highestCompletedLevel}));
  }

  function showScreen(screen){
    [homeScreen, levelsScreen, challengeScreen].forEach(s => s.classList.remove('active'));
    screen.classList.add('active');
  }

  function renderLevelsGrid(){
    levelsGrid.innerHTML = '';
    for(let i=0; i<questions.length; i++){
      const box = document.createElement('div');
      box.classList.add('level-box');
      box.textContent = (i+1);
      if(i < highestCompletedLevel){
        box.classList.add('completed');
      } else if(i === highestCompletedLevel){
        box.classList.add('current');
      } else {
        box.classList.add('locked');
      }
      if(i <= highestCompletedLevel){
        box.tabIndex = 0;
        box.addEventListener('click', () => startLevel(i));
        box.addEventListener('keydown', e => {
          if(e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            startLevel(i);
          }
        });
      }
      levelsGrid.appendChild(box);
    }
  }

  function startLevel(levelIndex){
    currentLevel = levelIndex;
    showChallenge(levelIndex);
  }

  function showChallenge(levelIndex){
    const q = questions[levelIndex];
    levelIndicator.textContent = `Level ${levelIndex+1} / ${questions.length}`;
    questionEl.textContent = q.question;
    hintEl.textContent = "🧠 Hint: " + q.hint;
    answerInput.value = '';
    feedbackEl.textContent = '';
    showScreen(challengeScreen);
    answerInput.focus();
  }

  function normalizeAnswer(ans){
    if(typeof ans !== 'string') return '';
    return ans.trim().toLowerCase();
  }

  function checkAnswer(userAns, correctAns){
    const ua = normalizeAnswer(userAns);
    const ca = normalizeAnswer(correctAns);

    if(!isNaN(ca) && !isNaN(ua)){
      return Number(ua) === Number(ca);
    }
    if(ca.includes('/')){
      return ua === ca;
    }
    return ua === ca;
  }

  function handleSubmit(){
    const userAnswer = answerInput.value;
    if(userAnswer.trim() === ''){
      showFeedback('Please enter an answer', false);
      return;
    }
    const correctAnswer = questions[currentLevel].answer;
    if(checkAnswer(userAnswer, correctAnswer)){
      showFeedback('Correct!', true);
      if(currentLevel >= highestCompletedLevel){
        highestCompletedLevel = currentLevel + 1;
        if(highestCompletedLevel > questions.length - 1) {
          highestCompletedLevel = questions.length - 1;
        }
        saveProgress();
      }
      if(currentLevel === questions.length -1){
        setTimeout(() => {
          alert("🎉 Congratulations! You completed all challenges!");
          showLevelsScreen();
        }, 700);
      } else {
        setTimeout(() => {
          startLevel(currentLevel + 1);
        }, 700);
      }
    } else {
      showFeedback('Wrong answer. Try again!', false);
      answerInput.focus();
    }
  }

  function showFeedback(msg, correct){
    feedbackEl.textContent = msg;
    feedbackEl.classList.toggle('correct', correct);
    feedbackEl.classList.toggle('wrong', !correct);
  }

  function showLevelsScreen(){
    renderLevelsGrid();
    showScreen(levelsScreen);
    levelsScreen.focus();
  }

  function showHomeScreen(){
    showScreen(homeScreen);
    startBtn.focus();
  }

  // <-- FIX HERE: Start from highest unlocked level -->
  startBtn.addEventListener('click', () => {
    // Start from the highest completed level (or 0 if none)
    // Note: highestCompletedLevel is next level unlocked index, so start there.
    currentLevel = highestCompletedLevel;
    if(currentLevel >= questions.length){
      currentLevel = questions.length - 1; // last level if completed all
    }
    showChallenge(currentLevel);
  });

  backToLevelsBtn.addEventListener('click', () => {
    showLevelsScreen();
  });

  levelsScreen.addEventListener('keydown', e => {
    if(e.key === 'Backspace' || e.key === 'Escape'){
      e.preventDefault();
      showHomeScreen();
    }
  });

  submitBtn.addEventListener('click', handleSubmit);
  answerInput.addEventListener('keydown', e => {
    if(e.key === 'Enter'){
      e.preventDefault();
      handleSubmit();
    }
  });
