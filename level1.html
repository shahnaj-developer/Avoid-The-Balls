    let current = {};
    let coins = 100;

    function updateCoins(amount) {
      coins += amount;
      document.getElementById("coins").innerText = coins;
      document.getElementById("watch-ad").style.display = coins <= 0 ? "block" : "none";
    }

    function startQuiz() {
      document.getElementById("intro").style.display = "none";
      document.getElementById("quiz").style.display = "block";
      loadQuestion();
    }

    function loadQuestion() {
      const randomIndex = Math.floor(Math.random() * questions.length);
      current = questions[randomIndex];
      document.getElementById("question").innerText = current.q;
      document.getElementById("answer").value = "";
      document.getElementById("hint").innerText = "";
      document.getElementById("feedback").innerText = "";
      document.getElementById("feedback").className = "";
    }

    function checkAnswer() {
      const input = document.getElementById("answer").value.trim().toLowerCase();
      const correct = current.a.toLowerCase();
      const feedback = document.getElementById("feedback");
      if (input === correct) {
        feedback.innerText = "✅ Correct! Here's your next question.";
        feedback.className = "correct";
        setTimeout(() => {
          feedback.innerText = "";
          loadQuestion();
        }, 1500);
      } else {
        feedback.innerText = "❌ Nope, try again.";
        feedback.className = "wrong";
      }
    }

    function showHint() {
      if (coins < 10) {
        alert("Not enough coins for a hint!");
        return;
      }
      updateCoins(-10);
      document.getElementById("hint").innerText = "🧠 Hint: " + current.h;
    }

    function showAnswer() {
      if (coins < 20) {
        alert("Not enough coins to show the answer!");
        return;
      }
      updateCoins(-20);
      document.getElementById("hint").innerText = "✅ Answer: " + current.a;
    }

    function watchAd() {
      alert("Ad watched! +40 coins earned.");
      updateCoins(40);
    }

    document.getElementById("answer").addEventListener("focus", () => {
  setTimeout(() => {
    document.getElementById("answer").scrollIntoView({ behavior: "smooth", block: "center" });
  }, 300);
});
