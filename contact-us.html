<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Us - Dodge the Ball</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');

    * {
      box-sizing: border-box;
      margin: 0; padding: 0;
    }
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      font-family: 'Poppins', sans-serif;
      color: #e0e7ff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      overflow-x: hidden;
    }
    .container {
      background: rgba(15, 32, 39, 0.85);
      border-radius: 20px;
      max-width: 600px;
      width: 100%;
      padding: 3rem 3rem;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
      backdrop-filter: blur(8px);
      border: 2px solid #0ff;
      animation: glowPulse 4s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      0% {
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        border-color: #0ff;
      }
      100% {
        box-shadow: 0 0 40px rgba(0, 255, 255, 1);
        border-color: #0ffccf;
      }
    }

    h1 {
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #00fff7;
      text-shadow: 0 0 8px #00fff7;
      font-weight: 800;
      font-size: 3rem;
      margin-bottom: 2rem;
      text-align: center;
    }

    p {
      font-weight: 300;
      font-size: 1.1rem;
      margin-bottom: 1.8rem;
      color: #c9e9f7;
      text-shadow: 0 0 3px #00fff7aa;
      text-align: center;
    }

    .email-link {
      display: block;
      text-align: center;
      margin-bottom: 2rem;
      font-weight: 600;
      font-size: 1.25rem;
      color: #00fff7;
      text-shadow: 0 0 8px #00fff7;
      text-decoration: underline;
      user-select: none;
      cursor: pointer;
    }
    .email-link:hover {
      color: #00ccaf;
      text-shadow: 0 0 15px #00ccaf;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }
    label {
      font-weight: 600;
      font-size: 1rem;
      color: #00fff7;
      text-shadow: 0 0 4px #00fff7cc;
    }
    input, textarea {
      background: rgba(0, 255, 255, 0.1);
      border: 2px solid #00fff7;
      border-radius: 12px;
      color: #e0e7ff;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      resize: vertical;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #00ccaf;
      box-shadow: 0 0 12px #00ccafaa;
      background: rgba(0, 204, 175, 0.15);
    }

    button {
      background: linear-gradient(45deg, #00fff7, #00b2a9);
      border: none;
      color: #012;
      font-weight: 700;
      padding: 1rem;
      border-radius: 30px;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 0 15px #00fff7cc;
      user-select: none;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #00fff7ff;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .container {
        padding: 2rem 1.5rem;
      }
      h1 {
        font-size: 2.4rem;
      }
    }

    /* Success message */
    #success-message {
      background: #00ccaf;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      color: #012;
      font-weight: 700;
      margin-bottom: 1.5rem;
      box-shadow: 0 0 10px #00ccafbb;
      display: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="container" role="main" aria-label="Contact Dodge the Ball">
    <h1>Contact Us</h1>
    <p>Have questions or feedback? We’d love to hear from you! Reach out anytime.</p>
    <a href="mailto:tahsin.abc2009@gmail.com" class="email-link" aria-label="Send email to tahsin.abc2009@gmail.com">
      tahsin.abc2009@gmail.com
    </a>

    <div id="success-message">Thank you! Your message has been sent successfully.</div>

    <form id="contact-form" action="https://formspree.io/f/xvgqlkbb" method="POST">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" required autocomplete="name" />

      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email" />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>

      <button type="submit" aria-label="Send Message">Send Message</button>
    </form>
  </main>

  <script>
    const form = document.getElementById('contact-form');
    const successMessage = document.getElementById('success-message');

    form.addEventListener('submit', async e => {
      e.preventDefault();

      const formData = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: formData,
          headers: {
            'Accept': 'application/json'
          }
        });

        if (response.ok) {
          successMessage.style.display = 'block';
          form.reset();
        } else {
          const data = await response.json();
          if (data.errors) {
            alert(data.errors.map(error => error.message).join(", "));
          } else {
            alert("Oops! There was a problem submitting your form");
          }
        }
      } catch (error) {
        alert("Oops! There was a problem submitting your form");
      }
    });
  </script>
</body>
</html>
