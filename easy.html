<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Neon Dodge: Avoid the Balls — Revamped</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#00f2ff;
    --bg-1:#05030b;
    --bg-2:#070722;
    --glass: rgba(255,255,255,0.04);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:#000; font-family:'Orbitron',sans-serif; -webkit-font-smoothing:antialiased;}
  .wrap{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    background: radial-gradient(circle at 30% 10%, #081025 0%, transparent 25%),
                radial-gradient(circle at 85% 90%, #24103a 0%, transparent 20%),
                linear-gradient(180deg,var(--bg-1),var(--bg-2));
  }

  /* Game container responsive */
  #gameContainer{
    width: 360px; height: 640px;
    max-width: 92vw; max-height: 92vh;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.005));
    border-radius:20px; overflow:hidden; position:relative;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 40px rgba(0,242,255,0.06) inset;
    border: 1px solid rgba(0,242,255,0.06);
    display:flex; flex-direction:column;
  }

  /* Canvas occupies the play area */
  .stage{
    position:relative; flex:1; display:flex; align-items:center; justify-content:center;
  }
  canvas{
    width:100%; height:100%; display:block;
    background: linear-gradient(180deg, rgba(0,0,0,0.25), rgba(0,0,0,0.6));
  }

  /* HUD */
  .hud{
    position:absolute; top:12px; left:12px; z-index:30; display:flex; gap:8px; align-items:center;
  }
  .hud .pill{
    background: rgba(0,0,0,0.35); padding:6px 10px; border-radius:10px; font-size:14px; color:var(--accent);
    box-shadow:0 6px 24px rgba(0,0,0,0.5), 0 0 10px rgba(0,242,255,0.06) inset;
  }

  .controls{
    position:absolute; right:12px; top:12px; z-index:30; display:flex; gap:8px;
  }
  .btn{
    background: rgba(0,0,0,0.4); border-radius:10px; padding:6px 8px; color:var(--accent); font-weight:700;
    border:1px solid rgba(0,242,255,0.08); cursor:pointer; user-select:none;
    box-shadow: 0 6px 16px rgba(0,0,0,0.6);
  }
  .btn:active{ transform: translateY(1px); }

  /* Bottom footer big */
  .footer{
    background: linear-gradient(180deg, rgba(0,0,0,0.45), rgba(0,0,0,0.6));
    padding:14px; display:flex; gap:10px; justify-content:space-between; align-items:center;
    border-top:1px solid rgba(0,242,255,0.03);
  }
  .footer .links{ display:flex; gap:10px; align-items:center; }
  .footer a{ color:var(--accent); text-decoration:none; font-size:13px; }

  /* Start overlay */
  .overlay{
    position:absolute; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(0deg, rgba(0,0,0,0.55), rgba(0,0,0,0.2));
    backdrop-filter: blur(6px);
  }
  .menu{
    width:min(320px,90%);
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:16px; padding:18px; text-align:center; color:var(--accent);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 30px rgba(0,242,255,0.05) inset;
    border:1px solid rgba(0,242,255,0.06);
  }
  .menu h1{ margin:6px 0 12px; font-size:20px; text-shadow:0 0 12px rgba(0,242,255,0.12);}
  .bigbtn{
    display:inline-block; padding:12px 18px; margin:8px; border-radius:12px; cursor:pointer;
    background:linear-gradient(90deg,#ff4177,#7a00ff,#00f2ff); color:white; font-weight:800;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 30px rgba(0,242,255,0.09);
    border: none; font-size:16px;
  }
  .small{ font-size:13px; opacity:0.9; margin-top:8px; }

  /* Joystick area (mobile): translucent bar for touch input */
  .joystickBar{
    position:absolute; bottom:70px; left:50%; transform:translateX(-50%); z-index:30;
    width:70%; height:64px; border-radius:40px; background: rgba(0,0,0,0.25);
    display:flex; align-items:center; justify-content:center; pointer-events:auto;
    box-shadow: 0 6px 18px rgba(0,0,0,0.6);
  }
  .knob{
    width:48px; height:48px; border-radius:50%; background:var(--accent); opacity:0.95;
    box-shadow: 0 0 18px rgba(0,242,255,0.9), inset 0 0 10px rgba(255,255,255,0.06);
    touch-action:none;
  }

  /* small mobile tweaks */
  @media (max-width:420px){
    #gameContainer{ border-radius:14px; }
    .joystickBar{ bottom:62px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div id="gameContainer" role="main" aria-label="Neon Dodge game">
    <div class="stage">
      <canvas id="gameCanvas" width="360" height="560" aria-hidden="false"></canvas>

      <!-- HUD -->
      <div class="hud" id="hud">
        <div class="pill" id="score">Score: 0.0</div>
        <div class="pill" id="mult">x1</div>
      </div>
      <div class="controls">
        <div class="btn" id="pauseBtn" title="Pause">⏸</div>
        <div class="btn" id="soundBtn" title="Toggle sound">🔊</div>
      </div>

      <!-- Mobile joystick -->
      <div class="joystickBar" id="joystickBar" aria-hidden="false" style="display:flex;">
        <div id="knob" class="knob" tabindex="0" role="slider" aria-label="Move"></div>
      </div>

      <!-- Start / Overlay menu -->
      <div class="overlay" id="overlay">
        <div class="menu" role="dialog" aria-modal="true">
          <h1>Neon Dodge</h1>
          <div style="margin:8px 0;color:#bfefff">Dodge the glowing balls. Survive as long as you can.</div>
          <div style="margin-top:12px">
            <button class="bigbtn" id="playEasy">Play Easy</button>
            <button class="bigbtn" id="playHard">Play Hard</button>
          </div>
          <div class="small">High Score: <span id="hs">0.0</span></div>
          <div style="margin-top:10px;font-size:12px;color:#9fefff88">Tip: collect glowing power-ups for shield, slow-time, and score-multiplier.</div>
        </div>
      </div>
    </div>
<!-- 
    <div class="footer" role="contentinfo">
      <div class="links">
        <a href="privacy-policy.html">Privacy Policy</a>
        <a href="about-us.html">About Us</a>
        <a href="contact-us.html">Contact</a>
      </div>
      <div style="color:var(--accent);font-size:13px">Made with ❤️ — Neon Dodge</div>
    </div> -->
  </div>
</div>

<!-- Optional short neon blip sound. Replace srcs if you host real files -->
<audio id="sndPop" src=""></audio>
<audio id="sndStar" src=""></audio>

<script>
  
/*
  Neon Dodge — Enhanced
  - Canvas rendering (particles, balls, shooting stars, glow)
  - Start menu: Play Easy / Play Hard
  - Power-ups: shield, slow, multiplier
  - HUD: score, multiplier, highscore (localStorage)
  - Pause, mute, joystick (touch), keyboard support
  - Collision explosion + screen shake
*/

/* CONFIG */
const CONFIG = {
  width: 360,
  height: 560,
  ballDiameter: 25,
  baseSpawnInterval: 1500,
  minSpawnInterval: 600, 
  maxBallSpeed: 6,
  particleLimit: 120,
  shootingStarChance: 0.6,
  shootingStarInterval: 1800,
  powerupChance: 0.08, // per spawn wave chance
};

// Canvas and context
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', {alpha: true});
canvas.width = CONFIG.width;
canvas.height = CONFIG.height;

// Scale canvas to container responsively (CSS sized)
function fitCanvas(){
  const rect = canvas.getBoundingClientRect();
  // keep drawing resolution fixed, scale is handled by CSS transforms automatically
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

// State
let score = 0;
let highScore = parseFloat(localStorage.getItem('neon_highscore') || 0);
document.getElementById('hs').textContent = highScore.toFixed(1);

let multiplier = 1;
let balls = [];         // {x,y,vy,diam,color}
let particles = [];     // visual particles for effects
let shootingStars = [];
let powerups = [];      // {x,y,type,vy}
let lastSpawn = 0;
let spawnInterval = CONFIG.baseSpawnInterval;
let lastTime = 0;
let gameRunning = false;
let paused = false;
let muted = false;
let shield = 0;         // shield timer
let slowTime = 0;       // slow time timer
let shake = 0;          // screen shake intensity
let playerX = CONFIG.width / 2;
const triangleHalfW = 20;
const triangleH = 35;
let targetX = playerX;
let difficulty = 'easy';

// DOM
const overlay = document.getElementById('overlay');
const playEasy = document.getElementById('playEasy');
const playHard = document.getElementById('playHard');
const scoreEl = document.getElementById('score');
const multEl = document.getElementById('mult');
const hsEl = document.getElementById('hs');
const pauseBtn = document.getElementById('pauseBtn');
const soundBtn = document.getElementById('soundBtn');
const knob = document.getElementById('knob');
const joystickBar = document.getElementById('joystickBar');

// audio placeholders
const sndPop = document.getElementById('sndPop');
const sndStar = document.getElementById('sndStar');

/* UTIL */
function rand(min,max){ return Math.random()*(max-min)+min; }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

/* PARTICLES */
function spawnParticle(x,y,color, count=10){
  for(let i=0;i<count;i++){
    if (particles.length > CONFIG.particleLimit) break;
    particles.push({
      x,y,
      vx: rand(-2,2),
      vy: rand(-3,1),
      life: rand(30,70),
      age:0,
      size: rand(1,3),
      color
    });
  }
}

/* SHOOTING STAR */
function addShootingStar(){
  if (Math.random()>CONFIG.shootingStarChance) return;
  shootingStars.push({
    x: rand(-80, CONFIG.width),
    y: rand(10, CONFIG.height*0.35),
    vx: rand(6,12),
    vy: rand(0.5,2),
    len: rand(50,140),
    life: rand(60,110),
    age:0,
    color: `hsl(${rand(180,260)}, 90%, 70%)`
  });
}

/* POWERUPS */
const POWER_TYPES = ['shield','slow','mult'];
function maybeSpawnPowerup(x,y){
  if (Math.random() < CONFIG.powerupChance){
    powerups.push({
      x,y,
      yv: rand(0.6,1.5),
      type: POWER_TYPES[Math.floor(Math.random()*POWER_TYPES.length)],
      wob: rand(0,Math.PI*2)
    });
  }
}

/* BALLS spawn patterns */
function spawnWave(){
  const cols = 6;
  const colWidth = CONFIG.width/cols;
  const patterns = ['horizontal','vertical','zigzag','grid'];
  const patt = patterns[Math.floor(Math.random()*patterns.length)];
  const speed = 1 + Math.min(score / 40, CONFIG.maxBallSpeed / 2); /*ball speed*/
  const ballsInWave = [];

  if (patt==='horizontal'){
    const gap = Math.floor(Math.random()*cols);
    for(let c=0;c<cols;c++){
      if (c===gap) continue;
      ballsInWave.push({
        x: c*colWidth + (colWidth - CONFIG.ballDiameter)/2,
        y: -CONFIG.ballDiameter,
        vy: speed + rand(0,0.6),
        colorHue: rand(0,360)
      });
    }
    maybeSpawnPowerup(rand(0,CONFIG.width), -20);
  } else if (patt==='vertical'){
    const col = Math.floor(Math.random()*cols);
    for(let r=0;r<4;r++){
      ballsInWave.push({
        x: col*colWidth + (colWidth - CONFIG.ballDiameter)/2,
        y: -CONFIG.ballDiameter - r*(CONFIG.ballDiameter+8),
        vy: speed + r*0.15,
        colorHue: rand(0,360)
      });
    }
  } else if (patt==='zigzag'){
    let start = Math.floor(Math.random()*cols);
    for(let r=0;r<4;r++){
      let c = (start + r) % cols;
      ballsInWave.push({
        x: c*colWidth + (colWidth - CONFIG.ballDiameter)/2,
        y: -CONFIG.ballDiameter - r*(CONFIG.ballDiameter+6),
        vy: speed + r*0.1,
        colorHue: rand(0,360)
      });
    }
  } else { // grid
    const gap = Math.floor(Math.random()*cols);
    for(let r=0;r<3;r++){
      for(let c=0;c<cols;c++){
        if (c===gap) continue;
        ballsInWave.push({
          x: c*colWidth + (colWidth - CONFIG.ballDiameter)/2,
          y: -CONFIG.ballDiameter - r*(CONFIG.ballDiameter+6),
          vy: speed + rand(0,0.4),
          colorHue: rand(0,360)
        });
      }
    }
  }
  balls.push(...ballsInWave);
}

/* TRIANGLE collision test: pointInTriangle (for center) */
function pointInTriangle(px, py, ax, ay, bx, by, cx, cy){
  const v0x = cx - ax, v0y = cy - ay;
  const v1x = bx - ax, v1y = by - ay;
  const v2x = px - ax, v2y = py - ay;
  const dot00 = v0x*v0x + v0y*v0y;
  const dot01 = v0x*v1x + v0y*v1y;
  const dot02 = v0x*v2x + v0y*v2y;
  const dot11 = v1x*v1x + v1y*v1y;
  const dot12 = v1x*v2x + v1y*v2y;
  const denom = dot00 * dot11 - dot01 * dot01;
  if (!denom) return false;
  const inv = 1/denom;
  const u = (dot11 * dot02 - dot01 * dot12) * inv;
  const v = (dot00 * dot12 - dot01 * dot02) * inv;
  return u>=0 && v>=0 && (u+v<1);
}

/* Game Over */
function gameOver(){
  gameRunning=false;
  spawnParticle(playerX, CONFIG.height - triangleH*0.6, 'hsl(0,90%,60%)', 30);
  shake = 10;
  if (!muted && sndPop.src) sndPop.play().catch(()=>{});
  // update HS
  if (score > highScore){
    highScore = score;
    localStorage.setItem('neon_highscore', highScore);
    hsEl.textContent = highScore.toFixed(1);
  }
  // show an animation overlay then reset
  overlay.style.display = 'flex';
}

/* Reset */
function reset(){
  score = 0;
  multiplier = 1;
  balls = [];
  particles = [];
  powerups = [];
  shootingStars = [];
  shield = 0;
  slowTime = 0;
  shake = 0;
  targetX = CONFIG.width / 2;
  playerX = targetX;

  lastSpawn = performance.now();

  // Reset spawnInterval based on difficulty
  spawnInterval = (difficulty === 'hard' ? CONFIG.baseSpawnInterval * 0.65 : CONFIG.baseSpawnInterval);

  gameRunning = true;
  paused = false;
  overlay.style.display = 'none';

  lastTime = performance.now();

  requestAnimationFrame(loop);
}

function update(delta){
  // spawn waves
  if (performance.now() - lastSpawn > spawnInterval){
    spawnWave();
    if (Math.random() < 0.35) maybeSpawnPowerup(rand(40, CONFIG.width-40), -20);
    lastSpawn = performance.now();

    // Update spawnInterval but clamp to minimum value
    let base = difficulty === 'hard' ? CONFIG.baseSpawnInterval * 0.65 : CONFIG.baseSpawnInterval;
    spawnInterval = base - Math.min(score * 10, base - CONFIG.minSpawnInterval);
  }

  // ... rest of your update logic ...
}



/* Draw functions */
function drawBackground(){
  // subtle gradient and moving rings
  const g = ctx.createLinearGradient(0,0,0,CONFIG.height);
  g.addColorStop(0,'rgba(0,16,40,0.15)');
  g.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,CONFIG.width,CONFIG.height);

  // centered soft radial glow
  const rad = ctx.createRadialGradient(CONFIG.width*0.5, CONFIG.height*0.2, 10, CONFIG.width*0.5, CONFIG.height*0.2, CONFIG.width*0.9);
  rad.addColorStop(0,'rgba(0,242,255,0.06)');
  rad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = rad;
  ctx.fillRect(0,0,CONFIG.width, CONFIG.height);
}

function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.age++;
    if (p.age > p.life){ particles.splice(i,1); continue; }
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05; // gravity
    const t = 1 - p.age/p.life;
    ctx.beginPath();
    ctx.fillStyle = p.color;
    ctx.globalAlpha = t;
    ctx.shadowBlur = 12 * t;
    ctx.shadowColor = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size);
    ctx.globalAlpha = 1;
  }
}

function drawShootingStars(){
  for(let i=shootingStars.length-1;i>=0;i--){
    const s = shootingStars[i];
    s.age++;
    if (s.age > s.life){ shootingStars.splice(i,1); continue; }
    s.x += s.vx;
    s.y += s.vy;
    const t = 1 - s.age/s.life;
    ctx.save();
    ctx.globalAlpha = t*0.9;
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 24;
    ctx.shadowColor = s.color;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(s.x - s.len*s.vx/Math.abs(s.vx), s.y - s.len*s.vy/Math.abs(s.vx || 1));
    ctx.stroke();
    ctx.restore();
  }
}

function drawPowerups(){
  for(let i=powerups.length-1;i>=0;i--){
    const pu = powerups[i];
    pu.y += pu.yv;
    pu.wob += 0.05;
    // draw orb with icon
    ctx.save();
    ctx.beginPath();
    const hue = pu.type==='shield' ? 190 : (pu.type==='slow' ? 270 : 40);
    ctx.fillStyle = `hsl(${hue},90%,60%)`;
    ctx.shadowBlur = 18; ctx.shadowColor = ctx.fillStyle;
    ctx.globalAlpha = 0.95;
    ctx.arc(pu.x, pu.y, 12, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
    // remove if offscreen
    if (pu.y > CONFIG.height + 30) powerups.splice(i,1);
  }
}

function drawBalls(){
  for(let i=balls.length-1;i>=0;i--){
    const b = balls[i];
    b.y += b.vy * (slowTime>0?0.35:1);
    // off-screen cull
    if (b.y > CONFIG.height + CONFIG.ballDiameter + 20){ balls.splice(i,1); continue; }
    // glow circle
    ctx.save();
    const hue = b.colorHue || 180;
    ctx.beginPath();
    const cx = b.x + CONFIG.ballDiameter/2;
    const cy = b.y + CONFIG.ballDiameter/2;
    const radius = CONFIG.ballDiameter/2;
    // outer glow
    ctx.fillStyle = `hsl(${hue},90%,55%)`;
    ctx.shadowBlur = 20;
    ctx.shadowColor = ctx.fillStyle;
    ctx.globalAlpha = 0.95;
    ctx.arc(cx, cy, radius, 0, Math.PI*2);
    ctx.fill();

    // inner core
    ctx.globalCompositeOperation = 'lighter';
    ctx.beginPath();
    const innerGrad = ctx.createRadialGradient(cx,cy,1,cx,cy,radius);
    innerGrad.addColorStop(0,'rgba(255,255,255,0.9)');
    innerGrad.addColorStop(0.2,'rgba(255,255,255,0.25)');
    innerGrad.addColorStop(1,`hsla(${hue},90%,30%,0.0)`);
    ctx.fillStyle = innerGrad;
    ctx.arc(cx, cy, radius*0.7, 0, Math.PI*2);
    ctx.fill();

    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

/* Draw player triangle */
function drawPlayer(){
  const tipX = playerX;
  const tipY = CONFIG.height - triangleH;
  const bx = playerX - triangleHalfW;
  const by = CONFIG.height;
  const cx = playerX + triangleHalfW;
  const cy = CONFIG.height;

  // shadow / glow
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(bx,by);
  ctx.lineTo(cx,cy);
  ctx.closePath();
  ctx.fillStyle = '#00f2ff';
  ctx.shadowBlur = 28;
  ctx.shadowColor = '#00f2ff';
  ctx.globalAlpha = 0.95;
  ctx.fill();

  // highlight
  ctx.beginPath();
  ctx.moveTo(tipX, tipY+6);
  ctx.lineTo(bx+6,by-6);
  ctx.lineTo(cx-6,cy-6);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fill();
  ctx.restore();

  // shield ring
  if (shield>0){
    ctx.save();
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(80,200,255,0.8)';
    ctx.lineWidth = 3;
    ctx.shadowBlur = 20;
    ctx.shadowColor = 'rgba(80,200,255,0.9)';
    ctx.arc(playerX, CONFIG.height-12, triangleHalfW+18, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }
}

/* Update & collisions */
function update(delta){
  // spawn waves only if gameRunning
if (gameRunning && performance.now() - lastSpawn > spawnInterval){
  spawnWave();
  if (Math.random() < 0.35) maybeSpawnPowerup(rand(40, CONFIG.width-40), -20);
  lastSpawn = performance.now();
  spawnInterval = CONFIG.baseSpawnInterval * 1.5 - Math.min(score * 5, CONFIG.baseSpawnInterval);
}

  // update particles/shooting stars
  for(let i=shootingStars.length-1;i>=0;i--){
    const s = shootingStars[i];
    s.x += s.vx;
    s.y += s.vy;
    s.age++;
    if (s.age > s.life) shootingStars.splice(i,1);
  }

  // powerup collection
  for(let i=powerups.length-1;i>=0;i--){
    const pu = powerups[i];
    const dx = pu.x - playerX;
    const dy = pu.y - (CONFIG.height - triangleH/2);
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 26){
      // collect
      if (pu.type==='shield') shield = 300;
      else if (pu.type==='slow') slowTime = 400;
      else if (pu.type==='mult') { multiplier = 2; setTimeout(()=>multiplier=1,8000); }
      spawnParticle(pu.x, pu.y, 'hsl(200,100%,70%)', 12);
      powerups.splice(i,1);
    }
  }

  // update balls and check collision with triangle
  const triTipY = CONFIG.height - triangleH;
  const ax = playerX, ay = triTipY;
  const bx = playerX - triangleHalfW, by = CONFIG.height;
  const cx = playerX + triangleHalfW, cy = CONFIG.height;
  for(let i=balls.length-1;i>=0;i--){
    const b = balls[i];
    // collision check: ball center in triangle
    const cxBall = b.x + CONFIG.ballDiameter/2;
    const cyBall = b.y + CONFIG.ballDiameter/2;
    if (pointInTriangle(cxBall, cyBall, ax, ay, bx, by, cx, cy)){
      if (shield>0){
        // consume shield
        shield = Math.max(0, shield - 120);
        balls.splice(i,1);
        spawnParticle(cxBall, cyBall, 'hsl(200,100%,70%)', 16);
      } else {
        spawnParticle(cxBall, cyBall, 'hsl(0,100%,60%)', 30);
        if (!muted && sndPop.src) sndPop.play().catch(()=>{});
        gameOver();
        return;
      }
    }
  }

  // move player smooth
  playerX += (targetX - playerX) * 0.16;
  playerX = clamp(playerX, 0, CONFIG.width);

  // update particles life
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.age++;
    if (p.age > p.life) particles.splice(i,1);
  }

  // slowTime ticks
  if (slowTime>0) slowTime--;
  if (shield>0) shield--;

  // scoring
  score += (delta/16.66) * 0.12 * multiplier;
  // small decay of multiplier showing
  multEl.textContent = 'x' + multiplier;
  scoreEl.textContent = `Score: ${score.toFixed(1)}`;
}

/* Render all */
function render(){
  // screen shake offset
  const sx = (Math.random()-0.5)*shake;
  const sy = (Math.random()-0.5)*shake;
  if (shake>0) shake *= 0.9;
  ctx.save();
  ctx.clearRect(0,0,CONFIG.width,CONFIG.height);
  ctx.translate(sx, sy);

  drawBackground();
  drawShootingStars();
  drawPowerups();
  drawBalls();
  drawPlayer();
  drawParticles();

  ctx.restore();
}

/* main loop */
function loop(ts){
  if (!lastTime) lastTime = ts;
  const delta = ts - lastTime;
  lastTime = ts;
  if (gameRunning && !paused){
    // spawn random shooting star occasionally
    if (Math.random() < 0.01) addShootingStar();

    // ball spawn
    if (balls.length < 120 && Math.random() < 0.5) { /* random extra spawns for spice */ }

    // update positions
    update(delta);
    render();
  }
  requestAnimationFrame(loop);
}

/* Event handlers: keyboard */
window.addEventListener('keydown', (e)=>{
  if (!gameRunning) return;
  if (e.key === 'ArrowLeft') targetX -= 30;
  if (e.key === 'ArrowRight') targetX += 30;
  targetX = clamp(targetX, 0, CONFIG.width);
});

/* Touch joystick logic */
let dragging=false;
let knobCenterX = 0;
function knobStart(e){
  dragging=true;
  knob.classList.add('active');
  e.preventDefault();
}
function knobEnd(){ dragging=false; knob.style.transform='translateX(0)'; knob.classList.remove('active'); targetX = CONFIG.width/2; }
function knobMove(e){
  if (!dragging) return;
  const rect = joystickBar.getBoundingClientRect();
  const clientX = (e.touches ? e.touches[0].clientX : e.clientX);
  let pos = clientX - rect.left;
  pos = clamp(pos, 10, rect.width-10);
  const norm = (pos - rect.width/2) / (rect.width/2);
  // map to playerX
  targetX = clamp(CONFIG.width/2 + norm * (CONFIG.width/2 - 30), 0, CONFIG.width);
  // visual knob
  const offset = (norm) * (rect.width/2 - 30);
  knob.style.transform = `translateX(${offset}px)`;
}
knob.addEventListener('touchstart', knobStart, {passive:false});
window.addEventListener('touchend', knobEnd);
window.addEventListener('touchmove', knobMove, {passive:false});
knob.addEventListener('mousedown', (e)=>{ knobStart(e); window.addEventListener('mousemove', knobMove); });
window.addEventListener('mouseup', ()=>{ knobEnd(); window.removeEventListener('mousemove', knobMove); });

/* Buttons */
playEasy.addEventListener('click', ()=>{
  difficulty='easy'; spawnInterval = CONFIG.baseSpawnInterval; overlay.style.display='none'; reset();
});
playHard.addEventListener('click', ()=>{
  difficulty='hard'; spawnInterval = CONFIG.baseSpawnInterval*0.65; overlay.style.display='none'; reset();
});
pauseBtn.addEventListener('click', ()=>{
  paused = !paused;
  pauseBtn.textContent = paused ? '▶' : '⏸';
});
soundBtn.addEventListener('click', ()=>{
  muted = !muted;
  soundBtn.textContent = muted ? '🔇' : '🔊';
});

/* Start screen tap to focus mobile (also allow clicking overlay to show tips) */
overlay.addEventListener('click', (e)=>{
  if (e.target === overlay) return;
});

/* initialization */
function init(){
  // initial random particles
  for(let i=0;i<30;i++){
    particles.push({x:rand(0,CONFIG.width), y:rand(0,CONFIG.height), vx:rand(-0.3,0.3), vy:rand(-0.2,0.2), life:rand(200,500), age:rand(0,200), size:rand(1,3), color: `hsla(${rand(170,280)},100%,70%,1)`});
  }
  // occasional shooting star timer
  setInterval(addShootingStar, CONFIG.shootingStarInterval);
}
init();

// start animation loop but keep overlay visible until user starts
requestAnimationFrame(loop);
</script>
</body>
</html>
