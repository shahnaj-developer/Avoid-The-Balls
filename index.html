<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Homepage</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
/* General resets */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Orbitron', sans-serif;
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background-color: black;
    position: relative;
    overflow-x: hidden;
}

canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
}

header {
    padding: 20px;
    text-align: center;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    font-weight: bold;
    text-shadow: 0 0 20px rgba(255,255,255,0.8);
    animation: fadeInDown 1s ease forwards;
    z-index: 1;
}

main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 20px;
    animation: fadeInUp 1.5s ease forwards;
    z-index: 1;
}

.game-button {
    padding: 15px 40px;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    font-weight: bold;
    border: none;
    cursor: pointer;
    color: white;
    border-radius: 12px;
    background: linear-gradient(90deg, #ff0040, #7a00ff, #00f2ff);
    background-size: 300% 300%;
    animation: buttonGlow 4s ease infinite, pulse 1.5s infinite;
    box-shadow: 0 0 20px rgba(0, 242, 255, 0.9);
    transition: transform 0.2s ease, box-shadow 0.3s ease;
    width: min(80%, 300px);
    text-align: center;
}

.game-button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 40px rgba(255, 255, 255, 1);
}

@keyframes buttonGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

/* Footer */
footer {
    background: black;
    padding: 20px 15px;
    z-index: 1;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeIn 2s ease forwards;
}

.footer-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
    max-width: 900px;
    gap: 15px;
}

/* Footer title */
.footer-title {
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    margin-bottom: 10px;
    color: white;
    text-shadow: 0 0 15px #00f2ff;
    font-weight: bold;
}

/* Footer links */
.footer-links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
}

.footer-links a {
    color: white;
    text-decoration: none;
    padding: 8px 16px;
    border-radius: 8px;
    background: #111;
    box-shadow: 0 0 5px rgba(0,0,0,0.5);
    transition: all 0.3s ease;
    font-size: clamp(0.85rem, 2vw, 1rem);
    font-weight: bold;
    flex-shrink: 0;
}

.footer-links a:hover {
    background: #222;
    transform: translateY(-3px);
}

/* Mobile adjustments */
@media (max-width: 600px) {
    footer { padding: 15px 10px; }
    .footer-title { font-size: 1rem; }
    .footer-links { gap: 8px; }
    .footer-links a { padding: 6px 10px; font-size: 0.8rem; border-radius: 6px; }
}

/* Animations */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>
<body>
<canvas id="letterGlitchCanvas"></canvas>

<header> Avoid The Balls </header>

<main>
    <button class="game-button" onclick="window.location.href='easy.html'">Play Easy</button>
    <button class="game-button" onclick="window.location.href='indexiq.html'">Play other game</button>
</main>

<footer>
    <div class="footer-container">
        <div class="footer-title">Game Info</div>
        <div class="footer-links">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="about-us.html">About Us</a>
            <a href="contact-us.html">Contact Us</a>
            <a href="Terms & Conditions.html">Terms & Conditions</a>
            <a href="Help & Support.html">Help & Support</a>
        </div>
    </div>
</footer>

<script>
(function(){
    const canvas = document.getElementById('letterGlitchCanvas');
    const ctx = canvas.getContext('2d');

    const glitchColors = ['#2b4539', '#61dca3', '#61b3dc'];
    const lettersAndSymbols = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$&*()-_+=/[]{};:<>?,0123456789'.split('');
    const fontSize = 16;
    const charWidth = 10;
    const charHeight = 20;
    let letters = [];
    let columns = 0, rows = 0;

    function getRandomChar(){ return lettersAndSymbols[Math.floor(Math.random() * lettersAndSymbols.length)]; }
    function getRandomColor(){ return glitchColors[Math.floor(Math.random() * glitchColors.length)]; }

    function resizeCanvas(){
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        columns = Math.ceil(canvas.width / charWidth);
        rows = Math.ceil(canvas.height / charHeight);
        letters = Array.from({ length: columns * rows }, () => ({ char: getRandomChar(), color: getRandomColor() }));
    }

    function drawLetters(){
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.font = `${fontSize}px monospace`;
        ctx.textBaseline = 'top';
        letters.forEach((letter, index) => {
            const x = (index % columns) * charWidth;
            const y = Math.floor(index / columns) * charHeight;
            ctx.fillStyle = letter.color;
            ctx.fillText(letter.char, x, y);
        });
    }

    function updateLetters(){
        const updateCount = Math.max(1, Math.floor(letters.length * 0.05));
        for(let i=0; i<updateCount; i++){
            const idx = Math.floor(Math.random() * letters.length);
            letters[idx].char = getRandomChar();
            letters[idx].color = getRandomColor();
        }
    }

    function animate(){
        updateLetters();
        drawLetters();
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    animate();
})();
</script>

</body>
</html>
